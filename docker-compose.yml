services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Postgres local opcional — em produção use Supabase
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: evangelho
      POSTGRES_PASSWORD: evangelho_dev
      POSTGRES_DB: evangelho_digital
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evangelho -d evangelho_digital"]
      interval: 10s
      timeout: 5s
      retries: 5

  agents:
    build:
      context: ./services/agents
      dockerfile: Dockerfile
    env_file:
      - ./services/agents/.env.example
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: REDACTED_DATABASE_URL
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./docs/institutional-memory:/app/institutional-memory:ro
    profiles:
      - agents

volumes:
  redis_data:
  postgres_data:
